name: Scrape live offers

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v5

      - name: Node einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Playwright Browser installieren
        run: npx playwright install --with-deps chromium

      - name: Scraper ausführen
        run: npm run scrape

      - name: Report erzeugen
        run: npm run render:report

      - name: Änderungen committen
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/offers.json report.md
          git diff --cached --quiet || git commit -m "chore: update offers data and report"
          git push

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Deploy-Artefakt vorbereiten
        run: |
          mkdir -p dist
          cp -R web/* dist/
          mkdir -p dist/data
          cp data/offers.json dist/data/offers.json

      - name: Pages-Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Auf GitHub Pages deployen
        id: deployment
        uses: actions/deploy-pages@v4
