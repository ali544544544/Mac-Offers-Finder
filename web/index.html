<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mac Offers Finder - Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="blob-bg"></div>
  <div class="blob-bg blob-2"></div>

  <header class="glass-header">
    <div class="container header-inner">
      <div class="logo-area">
        <h1>Mac Offers Finder</h1>
        <p class="subtitle">Live gescrapte Apple Deals – Fokus auf Preis-Leistung.</p>
      </div>
      <div class="header-actions">
        <button id="themeToggle" aria-label="Dark Mode umschalten" class="theme-toggle">
          <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
          <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sun" style="display:none;"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
        </button>
        <div class="stat-box">
          <span id="offerCount" class="stat-number">–</span>
          <span class="stat-label">Angebote</span>
        </div>
      </div>
    </div>
  </header>

  <main class="container page">
    <section class="topbar">
      <div id="meta" class="meta-box glass-panel">Lade Daten ...</div>
    </section>

    <section class="filters glass-panel">
      <div class="filter-header">
        <h2>Filter & Suche</h2>
      </div>
      <div class="filter-grid">
        <div class="filter-group">
          <label for="searchFilter">Freitext Suche</label>
          <input id="searchFilter" type="text" placeholder="z.B. M4 Max 36GB">
        </div>
        <div class="filter-group">
          <label for="sortFilter">Sortierung</label>
          <select id="sortFilter">
            <option value="score">DaVinci Resolve Score (Preis-Leistung)</option>
            <option value="priceAsc">Preis: Aufsteigend</option>
            <option value="priceDesc">Preis: Absteigend</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="sourceFilter">Quelle</label>
          <select id="sourceFilter">
            <option value="">Alle Quellen</option>
          </select>
        </div>
        <div class="filter-group">
          <label for="modelFilter">Modell</label>
          <select id="modelFilter">
            <option value="">Alle Modelle</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Zustand</label>
          <div id="conditionFilterBox" class="chip-group">
             <button class="chip active" data-val="">Alle</button>
             <button class="chip" data-val="apple-refurbished">Generalüberholt</button>
             <button class="chip" data-val="vorgaengermodell">Vorgängermodell</button>
             <button class="chip" data-val="gebrauchtware">Gebraucht</button>
             <button class="chip" data-val="b-ware">B-Ware</button>
          </div>
        </div>
        <div class="filter-group">
          <label>Farbe</label>
          <div id="colorSwatches" class="color-swatches">
            <!-- Dynamisch gefüllt -->
          </div>
        </div>
        <div class="filter-group filter-group-span2">
          <label style="display:flex; justify-content:space-between;">
            <span>Preisbereich</span>
            <strong id="priceRangeLabel" style="color:var(--accent);">0 € - 6000+ €</strong>
          </label>
          <div class="range-slider">
             <div class="range-track-bg"></div>
             <div class="range-track-fill" id="priceTrackFill"></div>
             <input type="range" id="minPriceRange" min="0" max="6000" value="0" step="50">
             <input type="range" id="maxPriceRange" min="0" max="6000" value="6000" step="50">
          </div>
        </div>
        <div class="filter-group">
          <label>RAM (GB)</label>
          <div id="ramFilterBox" class="chip-group">
            <button class="chip active" data-val="">Alle</button>
            <button class="chip" data-val="16">16 GB</button>
            <button class="chip" data-val="18">18 GB</button>
            <button class="chip" data-val="24">24 GB</button>
            <button class="chip" data-val="32">32 GB</button>
            <button class="chip" data-val="36">36 GB</button>
            <button class="chip" data-val="48">48 GB</button>
            <button class="chip" data-val="64">64 GB</button>
            <button class="chip" data-val="96">96 GB</button>
            <button class="chip" data-val="128">128 GB</button>
          </div>
        </div>
        <div class="filter-group">
          <label>Kapazität (SSD)</label>
          <div id="ssdFilterBox" class="chip-group">
            <button class="chip active" data-val="">Alle</button>
            <button class="chip" data-val="512">512 GB</button>
            <button class="chip" data-val="1000">1 TB</button>
            <button class="chip" data-val="2000">2 TB</button>
            <button class="chip" data-val="4000">4 TB</button>
            <button class="chip" data-val="8000">8 TB</button>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Top Empfehlung</h2>
      </div>
      <div id="bestOffer"></div>
    </section>

    <section class="section">
      <div class="section-head">
        <h2>Weitere Angebote</h2>
      </div>
      <div id="offers" class="offers-grid"></div>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
